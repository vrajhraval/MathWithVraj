<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Math Lab</title>
    <!-- Desmos API Script -->
    <script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=d3d74330-e283-4d1e-9181-42618456108b"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .math-container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e1e1e1;
        }

        .header-section {
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
        }

        .header-section h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .header-section p {
            opacity: 0.9;
            font-size: 14px;
            margin-top: 10px;
        }

        /* The Calculator Container */
        #calculator {
            width: 100%;
            height: 600px; /* Adjust height as needed */
            border-top: 1px solid #eee;
        }

        .footer-note {
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #888;
            background: #fafafa;
        }
    </style>
</head>
<body>

<div class="math-container">
    <div class="header-section">
        <h1>Interactive Graphing Lab</h1>
        <p>Explore functions, plot data, and visualize mathematics in real-time.</p>
    </div>

    <!-- This is where the calculator lives -->
    <div id="calculator"></div>

    <div class="footer-note">
        Powered by Desmos Graphing Technology • Built for Curious Minds
    </div>
</div>

<script>
    // Initialize the Desmos Calculator
    var elt = document.getElementById('calculator');
    var calculator = Desmos.GraphingCalculator(elt, {
        keypad: true,
        expressions: true,
        settingsMenu: true,
        zoomButtons: true,
        expressionsCollapsed: false
    });

    // Optional: Set a default equation for students to see immediately
    calculator.setExpression({ id: 'graph1', latex: 'y = x^2', color: Desmos.Colors.BLUE });
</script>

</body>
</html>
