<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Math Explorer (Stable Version)</title>

<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(','\\)']],
    displayMath: [['\\[','\\]']]
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    font-family:Arial;
    background:#050816;
    color:white;
}

#panel{
    position:absolute;
    top:15px;
    left:15px;
    width:380px;
    max-height:95vh;
    overflow:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:16px;
    padding:16px;
    z-index:10;
}

h1{
    font-size:20px;
    color:#4fc3f7;
}

select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    margin:10px 0;
    background:#111b3d;
    color:white;
}

.counter{
    display:flex;
    justify-content:space-between;
    color:#ffd54f;
    font-weight:bold;
}

.card{
    margin-top:10px;
    padding:10px;
    background:rgba(255,255,255,0.06);
    border-left:4px solid #4fc3f7;
    border-radius:8px;
    line-height:1.6;
}

</style>
</head>

<body>

<div id="panel">

<h1>📐 Stable 3D Math Explorer</h1>

<select id="shapeSelect">

<option value="cube">Cube</option>
<option value="cuboid">Cuboid</option>
<option value="sphere">Sphere</option>
<option value="cone">Cone</option>
<option value="cylinder">Cylinder</option>
<option value="torus">Torus</option>
<option value="tetrahedron">Tetrahedron</option>
<option value="octahedron">Octahedron</option>
<option value="icosahedron">Icosahedron</option>
<option value="dodecahedron">Dodecahedron</option>

</select>

<div class="counter">
<span id="vCount">Vertices: 0</span>
<span id="eCount">Edges: 0</span>
</div>

<div id="infoBox"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

/* ================= SAFE SCENE ================= */

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x050816);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,6);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

scene.add(new THREE.AmbientLight(0xffffff,1.2));

const light=new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(5,5,5);
scene.add(light);

/* GROUP */

let group=new THREE.Group();
scene.add(group);

function clear(){group.clear();}

/* COLORS */

const colors={
cube:0xff3b30,
cuboid:0xff9500,
sphere:0x00d2ff,
cone:0xffcc00,
cylinder:0xaf52de,
torus:0xff2d55,
tetrahedron:0x30d158,
octahedron:0x0a84ff,
icosahedron:0xffd60a,
dodecahedron:0x32d74b
};

/* MATH INFO (CLEAN LATEX) */

const info={

cube:["Cube","\\[V=a^3\\]","\\[x=y=z\\]","8 vertices, 12 edges"],

cuboid:["Cuboid","\\[V=lbh\\]","\\[(x,y,z)\\]","Rectangular prism"],

sphere:["Sphere","\\[V=\\frac{4}{3}\\pi r^3\\]","\\[x^2+y^2+z^2=r^2\\]","Perfect symmetry"],

cone:["Cone","\\[V=\\frac{1}{3}\\pi r^2 h\\]","\\[x^2+y^2=z^2\\]","1 vertex"],

cylinder:["Cylinder","\\[V=\\pi r^2 h\\]","\\[x^2+y^2=r^2\\]","2 circular bases"],

torus:["Torus","\\[V=2\\pi^2 R r^2\\]","Donut equation","Toroidal shape"],

tetrahedron:["Tetrahedron","\\[V=\\frac{a^3}{6\\sqrt2}\\]","Polyhedron","4 faces"],

octahedron:["Octahedron","\\[V=\\frac{\\sqrt2}{3}a^3\\]","Symmetric solid","8 faces"],

icosahedron:["Icosahedron","\\[V=\\frac{5(3+\\sqrt5)}{12}a^3\\]","Regular solid","20 faces"],

dodecahedron:["Dodecahedron","\\[V=\\frac{15+7\\sqrt5}{4}a^3\\]","Pentagon faces","12 faces"]

};

/* SAFE SHAPES ONLY */

function create(type){

clear();

let geo;

/* ONLY SAFE GEOMETRIES */

switch(type){

case "cube":geo=new THREE.BoxGeometry(2,2,2);break;
case "cuboid":geo=new THREE.BoxGeometry(2.5,1.5,1);break;
case "sphere":geo=new THREE.SphereGeometry(1.5,16,16);break;
case "cone":geo=new THREE.ConeGeometry(1.5,3,16);break;
case "cylinder":geo=new THREE.CylinderGeometry(1.2,1.2,3,16);break;
case "torus":geo=new THREE.TorusGeometry(1.5,0.5,16,32);break;
case "tetrahedron":geo=new THREE.TetrahedronGeometry(2);break;
case "octahedron":geo=new THREE.OctahedronGeometry(2);break;
case "icosahedron":geo=new THREE.IcosahedronGeometry(2);break;
case "dodecahedron":geo=new THREE.DodecahedronGeometry(2);break;

}

/* SOLID */

group.add(new THREE.Mesh(
geo,
new THREE.MeshPhongMaterial({
color:colors[type],
shininess:150
})
));

/* EDGES */

const edges=new THREE.EdgesGeometry(geo);

group.add(new THREE.LineSegments(
edges,
new THREE.LineBasicMaterial({color:0xffffff})
));

/* VERTICES */

const pos=geo.attributes.position;
const pts=[];

for(let i=0;i<pos.count;i++){
pts.push(new THREE.Vector3(
pos.getX(i),
pos.getY(i),
pos.getZ(i)
));
}

group.add(new THREE.Points(
new THREE.BufferGeometry().setFromPoints(pts),
new THREE.PointsMaterial({color:0xffd700,size:0.07})
));

/* COUNTERS */

document.getElementById("vCount").innerText="Vertices: "+pos.count;
document.getElementById("eCount").innerText="Edges: "+edges.geometry.attributes.position.count/2;

/* INFO */

const d=info[type];

document.getElementById("infoBox").innerHTML=`
<div class="card">

<b>${d[0]}</b><br><br>

Formula:<br>
\\[${d[1]}\\]<br><br>

Equation:<br>
\\[${d[2]}\\]<br><br>

${d[3]}

</div>
`;

setTimeout(()=>MathJax.typesetPromise(),50);

}

/* INIT */

create("cube");

document.getElementById("shapeSelect").addEventListener("change",(e)=>{
create(e.target.value);
});

/* LOOP */

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

/* RESIZE */

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
