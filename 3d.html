<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate 3D Math Explorer</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    font-family:Arial;
    background:#050816;
    color:white;
}

/* PANEL */

#panel{
    position:absolute;
    top:15px;
    left:15px;
    width:390px;
    max-height:95vh;
    overflow:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:18px;
    padding:20px;
    z-index:100;
}

h1{
    color:#4fc3f7;
    margin-bottom:10px;
}

select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111b3d;
    color:white;
    font-size:16px;
}

/* COUNTER */

.counter{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    color:#ffd54f;
    font-weight:bold;
}

/* INFO */

.info{
    margin-top:15px;
    line-height:1.6;
}

.card{
    margin-top:12px;
    padding:12px;
    background:rgba(255,255,255,0.07);
    border-left:4px solid #4fc3f7;
    border-radius:10px;
}

</style>
</head>

<body>

<div id="panel">

<h1>📐 Ultimate 3D Math Explorer</h1>

<select id="shapeSelect">

<optgroup label="Basic Geometry">
<option value="cube">Cube</option>
<option value="sphere">Sphere</option>
<option value="cone">Cone</option>
<option value="cylinder">Cylinder</option>
<option value="torus">Torus</option>
</optgroup>

<optgroup label="Platonic Solids">
<option value="tetrahedron">Tetrahedron</option>
<option value="octahedron">Octahedron</option>
<option value="icosahedron">Icosahedron</option>
<option value="dodecahedron">Dodecahedron</option>
</optgroup>

</select>

<div class="counter">
<span id="vCount">Vertices: 0</span>
<span id="eCount">Edges: 0</span>
</div>

<div id="infoBox" class="info"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

/* ================= SCENE ================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050816);

/* ================= CAMERA ================= */

const camera = new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,2,6);

/* ================= RENDERER ================= */

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ================= CONTROLS ================= */

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

/* ================= LIGHT ================= */

scene.add(new THREE.AmbientLight(0xffffff,1.2));
const light = new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(5,5,5);
scene.add(light);

/* ================= GROUP ================= */

let group = new THREE.Group();
scene.add(group);

function clearGroup(){
group.clear();
}

/* ================= COLORS ================= */

const colors={
cube:0xff0000,
sphere:0x00ffff,
cone:0xff8800,
cylinder:0x8000ff,
torus:0xff1493,
tetrahedron:0x00ff66,
octahedron:0x0066ff,
icosahedron:0xffff00,
dodecahedron:0x66ff00
};

/* ================= INFO (FULL + LATEX) ================= */

const infoData = {

cube:{
title:"Cube",
formula:"\\[V = a^3\\]",
eq:"\\[x=y=z\\]",
extra:"6 faces, 12 edges, 8 vertices"
},

sphere:{
title:"Sphere",
formula:"\\[V = \\frac{4}{3}\\pi r^3\\]",
eq:"\\[x^2+y^2+z^2=r^2\\]",
extra:"Perfect symmetric 3D shape"
},

cone:{
title:"Cone",
formula:"\\[V = \\frac{1}{3}\\pi r^2 h\\]",
eq:"\\[x^2+y^2=z^2\\]",
extra:"Has 1 vertex and circular base"
},

cylinder:{
title:"Cylinder",
formula:"\\[V = \\pi r^2 h\\]",
eq:"\\[x^2+y^2=r^2\\]",
extra:"Two circular bases"
},

torus:{
title:"Torus",
formula:"\\[V = 2\\pi^2 R r^2\\]",
eq:"\\[(R-\\sqrt{x^2+y^2})^2+z^2=r^2\\]",
extra:"Donut shaped geometry"
},

tetrahedron:{
title:"Tetrahedron",
formula:"\\[V = \\frac{a^3}{6\\sqrt{2}}\\]",
eq:"Platonic Solid",
extra:"4 triangular faces"
},

octahedron:{
title:"Octahedron",
formula:"\\[V = \\frac{\\sqrt{2}}{3}a^3\\]",
eq:"Symmetric solid",
extra:"8 triangular faces"
},

icosahedron:{
title:"Icosahedron",
formula:"\\[V = \\frac{5(3+\\sqrt5)}{12}a^3\\]",
eq:"Regular polyhedron",
extra:"20 triangular faces"
},

dodecahedron:{
title:"Dodecahedron",
formula:"\\[V = \\frac{15+7\\sqrt5}{4}a^3\\]",
eq:"Pentagon faces",
extra:"12 faces total"
}

};

/* ================= CREATE SHAPE ================= */

let current;

function createShape(type){

clearGroup();

let geometry;

/* shapes */

switch(type){

case "cube":geometry=new THREE.BoxGeometry(2,2,2);break;
case "sphere":geometry=new THREE.SphereGeometry(1.5,16,16);break;
case "cone":geometry=new THREE.ConeGeometry(1.5,3,16);break;
case "cylinder":geometry=new THREE.CylinderGeometry(1.2,1.2,3,16);break;
case "torus":geometry=new THREE.TorusGeometry(1.5,0.5,16,32);break;
case "tetrahedron":geometry=new THREE.TetrahedronGeometry(2);break;
case "octahedron":geometry=new THREE.OctahedronGeometry(2);break;
case "icosahedron":geometry=new THREE.IcosahedronGeometry(2);break;
case "dodecahedron":geometry=new THREE.DodecahedronGeometry(2);break;

}

/* SOLID */

const mesh=new THREE.Mesh(
geometry,
new THREE.MeshPhongMaterial({
color:colors[type]||0xffffff,
shininess:200
})
);

group.add(mesh);

/* EDGES */

const edges=new THREE.EdgesGeometry(geometry);

group.add(new THREE.LineSegments(
edges,
new THREE.LineBasicMaterial({color:0xffffff})
));

/* VERTICES */

const pos=geometry.attributes.position;
const pts=[];

for(let i=0;i<pos.count;i++){
pts.push(new THREE.Vector3(
pos.getX(i),
pos.getY(i),
pos.getZ(i)
));
}

group.add(new THREE.Points(
new THREE.BufferGeometry().setFromPoints(pts),
new THREE.PointsMaterial({
color:0xffd700,
size:0.08
})
));

/* COUNTERS */

document.getElementById("vCount").innerText="Vertices: "+pos.count;
document.getElementById("eCount").innerText="Edges: "+edges.attributes.position.count/2;

/* INFO */

const d=infoData[type];

document.getElementById("infoBox").innerHTML=`
<div class="card">
<b>${d.title}</b><br><br>

Formula:<br>
\\[${d.formula}\\]<br><br>

Equation:<br>
\\[${d.eq}\\]<br><br>

${d.extra}
</div>
`;

MathJax.typesetPromise();

}

/* INIT */

createShape("cube");

document.getElementById("shapeSelect").addEventListener("change",(e)=>{
createShape(e.target.value);
});

/* LOOP */

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

/* RESIZE */

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
