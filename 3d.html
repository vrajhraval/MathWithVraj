<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Mathematics Shapes Explorer</title>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        overflow:hidden;
        background:#050816;
        color:white;
    }

    #container{
        width:100vw;
        height:100vh;
    }

    .panel{
        position:absolute;
        top:15px;
        left:15px;
        width:320px;
        background:rgba(10,15,35,0.9);
        padding:20px;
        border-radius:18px;
        backdrop-filter: blur(10px);
        border:1px solid rgba(255,255,255,0.1);
        z-index:10;
        max-height:95vh;
        overflow:auto;
    }

    .panel h1{
        font-size:24px;
        margin-bottom:10px;
        color:#4fc3f7;
    }

    .panel p{
        font-size:14px;
        line-height:1.6;
        margin-bottom:15px;
        color:#ddd;
    }

    select{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        margin-bottom:15px;
        background:#111b3d;
        color:white;
        font-size:15px;
    }

    .info{
        margin-top:10px;
        padding:15px;
        background:#101935;
        border-radius:12px;
        line-height:1.7;
    }

    .info h2{
        color:#ffd54f;
        margin-bottom:10px;
    }

    .badge{
        display:inline-block;
        padding:6px 12px;
        border-radius:30px;
        background:#1e88e5;
        margin-top:10px;
        font-size:13px;
    }

    .footer{
        margin-top:15px;
        font-size:12px;
        color:#aaa;
    }

    canvas{
        display:block;
    }

    .controls{
        margin-top:15px;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        margin-top:10px;
        background:linear-gradient(45deg,#00c6ff,#0072ff);
        color:white;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.03);
    }
</style>
</head>
<body>

<div class="panel">
    <h1>📐 3D Mathematics Shapes</h1>

    <p>
        Explore important 3D mathematical shapes from school level to advanced geometry.
        Rotate, zoom and learn interactively.
    </p>

    <select id="shapeSelector">
        <option value="cube">Cube</option>
        <option value="sphere">Sphere</option>
        <option value="cone">Cone</option>
        <option value="cylinder">Cylinder</option>
        <option value="torus">Torus</option>
        <option value="tetrahedron">Tetrahedron</option>
        <option value="octahedron">Octahedron</option>
        <option value="icosahedron">Icosahedron</option>
        <option value="dodecahedron">Dodecahedron</option>
        <option value="knot">Torus Knot</option>
    </select>

    <div class="controls">
        <button onclick="toggleRotation()">⏯ Toggle Rotation</button>
        <button onclick="wireframeMode()">🔲 Toggle Wireframe</button>
    </div>

    <div class="info" id="shapeInfo">
        <h2>Cube</h2>
        <p>
            A cube has 6 square faces, 12 edges and 8 vertices.
        </p>
        <div class="badge">School Level Geometry</div>
    </div>

    <div class="footer">
        Made for GitHub Pages • Interactive Mathematics Learning
    </div>
</div>

<div id="container"></div>

<script>
    const container = document.getElementById("container");

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050816);

    // Camera
    const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.set(0, 2, 6);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(5,5,5);
    scene.add(directionalLight);

    // Grid
    const grid = new THREE.GridHelper(20,20,0x444444,0x222222);
    scene.add(grid);

    // Shape Data
    const shapeDescriptions = {
        cube: {
            title:"Cube",
            text:"A cube has 6 square faces, 12 edges and 8 vertices.",
            level:"School Level Geometry"
        },
        sphere: {
            title:"Sphere",
            text:"A sphere is a perfectly round 3D object where every point is equally distant from the center.",
            level:"Basic Geometry"
        },
        cone: {
            title:"Cone",
            text:"A cone has one circular base and a single apex.",
            level:"Middle School Geometry"
        },
        cylinder: {
            title:"Cylinder",
            text:"A cylinder has two parallel circular bases connected by a curved surface.",
            level:"Basic Solid Geometry"
        },
        torus: {
            title:"Torus",
            text:"A torus looks like a donut shape and is studied in topology and advanced geometry.",
            level:"Higher Mathematics"
        },
        tetrahedron: {
            title:"Tetrahedron",
            text:"A tetrahedron is a pyramid with 4 triangular faces.",
            level:"Polyhedra Geometry"
        },
        octahedron: {
            title:"Octahedron",
            text:"An octahedron has 8 triangular faces.",
            level:"Advanced Geometry"
        },
        icosahedron: {
            title:"Icosahedron",
            text:"An icosahedron has 20 triangular faces.",
            level:"Higher Geometry"
        },
        dodecahedron: {
            title:"Dodecahedron",
            text:"A dodecahedron has 12 pentagonal faces.",
            level:"Platonic Solids"
        },
        knot: {
            title:"Torus Knot",
            text:"A torus knot is studied in topology and higher dimensional mathematics.",
            level:"University Mathematics"
        }
    };

    let material = new THREE.MeshStandardMaterial({
        color:0x4fc3f7,
        metalness:0.3,
        roughness:0.2
    });

    let currentShape;
    let rotating = true;
    let wireframe = false;

    function createShape(type){

        if(currentShape){
            scene.remove(currentShape);
        }

        let geometry;

        switch(type){

            case "cube":
                geometry = new THREE.BoxGeometry(2,2,2);
                break;

            case "sphere":
                geometry = new THREE.SphereGeometry(1.5,64,64);
                break;

            case "cone":
                geometry = new THREE.ConeGeometry(1.5,3,64);
                break;

            case "cylinder":
                geometry = new THREE.CylinderGeometry(1.2,1.2,3,64);
                break;

            case "torus":
                geometry = new THREE.TorusGeometry(1.5,0.5,32,100);
                break;

            case "tetrahedron":
                geometry = new THREE.TetrahedronGeometry(2);
                break;

            case "octahedron":
                geometry = new THREE.OctahedronGeometry(2);
                break;

            case "icosahedron":
                geometry = new THREE.IcosahedronGeometry(2);
                break;

            case "dodecahedron":
                geometry = new THREE.DodecahedronGeometry(2);
                break;

            case "knot":
                geometry = new THREE.TorusKnotGeometry(1,0.3,128,32);
                break;
        }

        currentShape = new THREE.Mesh(geometry, material);
        scene.add(currentShape);

        updateInfo(type);
    }

    function updateInfo(type){
        const data = shapeDescriptions[type];

        document.getElementById("shapeInfo").innerHTML = `
            <h2>${data.title}</h2>
            <p>${data.text}</p>
            <div class="badge">${data.level}</div>
        `;
    }

    // Initial Shape
    createShape("cube");

    // Shape Selector
    document.getElementById("shapeSelector").addEventListener("change",(e)=>{
        createShape(e.target.value);
    });

    // Rotation Toggle
    function toggleRotation(){
        rotating = !rotating;
    }

    // Wireframe Toggle
    function wireframeMode(){
        wireframe = !wireframe;
        material.wireframe = wireframe;
    }

    // Animation
    function animate(){
        requestAnimationFrame(animate);

        if(currentShape && rotating){
            currentShape.rotation.y += 0.01;
            currentShape.rotation.x += 0.005;
        }

        controls.update();
        renderer.render(scene,camera);
    }

    animate();

    // Resize
    window.addEventListener("resize",()=>{
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
