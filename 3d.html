<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Geometry Lab</title>
    <style>
        :root {
            --primary: #4f46e5;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--dark);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        main {
            display: flex;
            flex: 1;
            position: relative;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 10;
            width: 250px;
        }

        h3 {
            margin-top: 0;
            color: var(--dark);
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        button {
            background: white;
            color: var(--dark);
            border: 2px solid #e2e8f0;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: left;
        }

        button:hover {
            background: #f1f5f9;
            border-color: var(--primary);
        }

        button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-size: 0.85rem;
            pointer-events: none;
            text-align: center;
        }

        #canvas-container {
            flex: 1;
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- Include Three.js and OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <header>
        <h1>3D Geometry Exploration Lab</h1>
        <p>Click and drag to rotate. Scroll to zoom. Explore shapes from every angle!</p>
    </header>

    <main>
        <div id="controls">
            <h3>Select a Shape</h3>
            <div class="btn-group">
                <button class="active" onclick="switchShape('cube')">Cube (Hexahedron)</button>
                <button onclick="switchShape('sphere')">Sphere</button>
                <button onclick="switchShape('cylinder')">Cylinder</button>
                <button onclick="switchShape('cone')">Cone</button>
                <button onclick="switchShape('pyramid')">Pyramid (Tetrahedron)</button>
                <button onclick="switchShape('torus')">Torus (Donut)</button>
            </div>
        </div>

        <div id="instructions">🖱️ Left Click + Drag to Rotate | 📜 Scroll to Zoom | 🖱️ Right Click + Drag to Pan</div>
        <div id="canvas-container"></div>
    </main>

    <script>
        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf8fafc); // Matches --light CSS variable

        // Camera
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 5, 8);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Controls (Allows moving around with mouse)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(5, 10, 7);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x4f46e5, 0.3); // Subtle blue tint light
        dirLight2.position.set(-5, -5, -5);
        scene.add(dirLight2);

        // Grid & Axes Helpers for Math context
        const gridHelper = new THREE.GridHelper(10, 10, 0x4f46e5, 0xcbd5e1);
        gridHelper.position.y = -2;
        scene.add(gridHelper);

        // --- Shapes Definition ---
        let currentMesh;

        // Materials setup (Wireframe + Solid to see depth clearly)
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x4f46e5, 
            roughness: 0.4,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        
        const wireframeMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, 
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });

        // Dictionary of Geometries
        const geometries = {
            cube: new THREE.BoxGeometry(2, 2, 2),
            sphere: new THREE.SphereGeometry(1.5, 32, 32),
            cylinder: new THREE.CylinderGeometry(1, 1, 2.5, 32),
            cone: new THREE.ConeGeometry(1.2, 2.5, 32),
            pyramid: new THREE.ConeGeometry(1.5, 2.5, 4), // 4 sides cone = pyramid
            torus: new THREE.TorusGeometry(1, 0.4, 16, 100)
        };

        // Function to load/change shapes
        function switchShape(shapeName) {
            // Remove old shape if it exists
            if (currentMesh) scene.remove(currentMesh);

            // Create combined mesh (Solid shape + wireframe overlay for mathematical clarity)
            const group = new THREE.Group();
            const mainMesh = new THREE.Mesh(geometries[shapeName], material);
            const wireMesh = new THREE.Mesh(geometries[shapeName], wireframeMaterial);
            
            group.add(mainMesh);
            group.add(wireMesh);
            
            currentMesh = group;
            scene.add(currentMesh);

            // Update Active Class on Buttons
            const buttons = document.querySelectorAll('.btn-group button');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Initialize with Cube
        switchShape('cube');

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Slowly rotate the shape on its own when not being dragged
            if (currentMesh && !controls.state == -1) {
                currentMesh.rotation.y += 0.005;
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- Handle Window Resize ---
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
    </script>
</body>
</html>
