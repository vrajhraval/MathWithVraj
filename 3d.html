<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Mathematics Explorer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#dbeafe,#f0f9ff,#ffffff);
    color:#1e293b;
}

/* SIDE PANEL */

#panel{

    position:absolute;
    top:15px;
    left:15px;

    width:360px;
    max-height:95vh;

    overflow:auto;

    background:rgba(255,255,255,0.8);

    backdrop-filter:blur(12px);

    border-radius:20px;

    padding:22px;

    box-shadow:0 10px 30px rgba(0,0,0,0.12);

    z-index:100;
}

h1{
    color:#2563eb;
    margin-bottom:12px;
    font-size:30px;
}

.subtitle{
    color:#475569;
    line-height:1.6;
    margin-bottom:20px;
}

/* SELECT */

select{

    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    background:#eff6ff;

    color:#1e3a8a;

    font-size:16px;

    font-weight:bold;

    outline:none;

    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* INFO SECTION */

.info{
    margin-top:20px;
}

.info h2{
    color:#0f172a;
    margin-bottom:10px;
}

.desc{
    line-height:1.7;
    color:#334155;
    margin-bottom:14px;
}

/* CARDS */

.card{

    background:#f8fafc;

    border-left:5px solid #3b82f6;

    padding:14px;

    border-radius:12px;

    margin-top:12px;

    box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.card strong{
    color:#2563eb;
}

.level{

    display:inline-block;

    margin-top:15px;

    background:#2563eb;

    color:white;

    padding:7px 14px;

    border-radius:30px;

    font-size:13px;

    font-weight:bold;
}

.tip{

    margin-top:18px;

    padding:12px;

    background:#ecfeff;

    border-radius:12px;

    color:#155e75;

    line-height:1.6;
}

/* SCROLLBAR */

#panel::-webkit-scrollbar{
    width:8px;
}

#panel::-webkit-scrollbar-thumb{
    background:#93c5fd;
    border-radius:20px;
}

</style>
</head>
<body>

<div id="panel">

    <h1>📐 3D Math Explorer</h1>

    <p class="subtitle">
        Learn mathematics visually with interactive 3D shapes from school level to higher mathematics.
    </p>

    <select id="shapeSelect">

        <optgroup label="Basic Geometry">
            <option value="cube">Cube</option>
            <option value="sphere">Sphere</option>
            <option value="cone">Cone</option>
            <option value="cylinder">Cylinder</option>
            <option value="torus">Torus</option>
        </optgroup>

        <optgroup label="Platonic Solids">
            <option value="tetrahedron">Tetrahedron</option>
            <option value="octahedron">Octahedron</option>
            <option value="icosahedron">Icosahedron</option>
            <option value="dodecahedron">Dodecahedron</option>
        </optgroup>

        <optgroup label="Higher Mathematics">
            <option value="paraboloid">Paraboloid</option>
            <option value="hyperboloid">Hyperboloid</option>
            <option value="ellipsoid">Ellipsoid</option>
            <option value="mobius">Mobius Strip</option>
            <option value="knot">Torus Knot</option>
        </optgroup>

    </select>

    <div class="info" id="infoBox"></div>

</div>

<!-- THREE JS -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

/* =========================
   SCENE
========================= */

const scene = new THREE.Scene();

scene.background = new THREE.Color(0xe0f2fe);

/* =========================
   CAMERA
========================= */

const camera = new THREE.PerspectiveCamera(

    70,

    window.innerWidth/window.innerHeight,

    0.1,

    1000

);

camera.position.set(0,2,6);

/* =========================
   RENDERER
========================= */

const renderer = new THREE.WebGLRenderer({

    antialias:true

});

renderer.setSize(

    window.innerWidth,

    window.innerHeight

);

document.body.appendChild(renderer.domElement);

/* =========================
   CONTROLS
========================= */

const controls = new THREE.OrbitControls(

    camera,

    renderer.domElement

);

controls.enableDamping = true;

/* =========================
   LIGHTS
========================= */

const ambientLight = new THREE.AmbientLight(

    0xffffff,

    1.2

);

scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(

    0xffffff,

    1.5

);

directionalLight.position.set(5,5,5);

scene.add(directionalLight);

/* =========================
   GRID
========================= */

const grid = new THREE.GridHelper(

    30,

    30,

    0x94a3b8,

    0xcbd5e1

);

scene.add(grid);

/* =========================
   SHAPE INFO
========================= */

const infoData = {

cube:{
title:"Cube",
desc:"A cube is a 3D solid where all edges are equal and every face is a square.",
formula:"Volume = a³",
eq:"Equal dimensions along x, y and z axes",
extra:"A cube has 6 faces, 12 edges and 8 vertices.",
level:"School Geometry"
},

sphere:{
title:"Sphere",
desc:"A sphere is a perfectly round object where all surface points are equally distant from the center.",
formula:"Volume = (4/3)πr³",
eq:"x² + y² + z² = r²",
extra:"Earth, balls and bubbles resemble spherical shapes.",
level:"School Geometry"
},

cone:{
title:"Cone",
desc:"A cone has one circular base connected to a single apex point.",
formula:"Volume = (1/3)πr²h",
eq:"x² + y² = z²",
extra:"Cones are used in optics, architecture and engineering.",
level:"Middle School Geometry"
},

cylinder:{
title:"Cylinder",
desc:"A cylinder has two parallel circular bases connected by a curved surface.",
formula:"Volume = πr²h",
eq:"x² + y² = r²",
extra:"Pipes and cans are cylindrical objects.",
level:"Basic Geometry"
},

torus:{
title:"Torus",
desc:"A torus is a donut-shaped surface important in topology.",
formula:"Advanced Surface Geometry",
eq:"(R−√(x²+y²))² + z² = r²",
extra:"Magnetic fields often form toroidal patterns.",
level:"Higher Mathematics"
},

tetrahedron:{
title:"Tetrahedron",
desc:"A tetrahedron contains 4 triangular faces.",
formula:"Volume = a³/(6√2)",
eq:"Polyhedral Geometry",
extra:"It is one of the five Platonic solids.",
level:"Advanced Geometry"
},

octahedron:{
title:"Octahedron",
desc:"An octahedron contains 8 triangular faces with high symmetry.",
formula:"Volume = (√2/3)a³",
eq:"Polyhedral Geometry",
extra:"Used in chemistry and crystal structures.",
level:"Higher Geometry"
},

icosahedron:{
title:"Icosahedron",
desc:"An icosahedron contains 20 triangular faces.",
formula:"Complex Polyhedron Formula",
eq:"Regular Polyhedron",
extra:"Important in mathematics and 3D modeling.",
level:"University Geometry"
},

dodecahedron:{
title:"Dodecahedron",
desc:"A dodecahedron contains 12 pentagonal faces.",
formula:"Advanced Polyhedral Formula",
eq:"Regular Polyhedron",
extra:"One of the famous Platonic solids.",
level:"Higher Geometry"
},

paraboloid:{
title:"Paraboloid",
desc:"A paraboloid is formed when a parabola rotates in 3D space.",
formula:"z = x² + y²",
eq:"Parabola Equation: y = x²",
extra:"Satellite dishes use paraboloid geometry.",
level:"Analytical Geometry"
},

hyperboloid:{
title:"Hyperboloid",
desc:"A hyperboloid is generated from hyperbolas in three dimensions.",
formula:"x² + y² − z² = 1",
eq:"x²/a² − y²/b² = 1",
extra:"Cooling towers use hyperboloid structures.",
level:"Higher Mathematics"
},

ellipsoid:{
title:"Ellipsoid",
desc:"An ellipsoid is a stretched or compressed sphere.",
formula:"x²/a² + y²/b² + z²/c² = 1",
eq:"Ellipse: x²/a² + y²/b² = 1",
extra:"Earth approximately resembles an ellipsoid.",
level:"Analytical Geometry"
},

mobius:{
title:"Mobius Strip",
desc:"A Möbius strip has only one side and one edge.",
formula:"Topological Surface",
eq:"Non-orientable Geometry",
extra:"Walking along it returns you upside-down.",
level:"Topology"
},

knot:{
title:"Torus Knot",
desc:"A torus knot is studied in topology and knot theory.",
formula:"Parametric Equations",
eq:"Advanced Topology",
extra:"Used in advanced mathematics and physics.",
level:"University Mathematics"
}

};

/* =========================
   CURRENT SHAPE
========================= */

let currentShape;

/* =========================
   CREATE SHAPE
========================= */

function createShape(type){

    if(currentShape){

        scene.remove(currentShape);

    }

    let geometry;

    switch(type){

        case "cube":
            geometry = new THREE.BoxGeometry(2,2,2);
            break;

        case "sphere":
            geometry = new THREE.SphereGeometry(1.5,64,64);
            break;

        case "cone":
            geometry = new THREE.ConeGeometry(1.5,3,64);
            break;

        case "cylinder":
            geometry = new THREE.CylinderGeometry(1.2,1.2,3,64);
            break;

        case "torus":
            geometry = new THREE.TorusGeometry(1.5,0.5,32,100);
            break;

        case "tetrahedron":
            geometry = new THREE.TetrahedronGeometry(2);
            break;

        case "octahedron":
            geometry = new THREE.OctahedronGeometry(2);
            break;

        case "icosahedron":
            geometry = new THREE.IcosahedronGeometry(2);
            break;

        case "dodecahedron":
            geometry = new THREE.DodecahedronGeometry(2);
            break;

        case "paraboloid":
            geometry = new THREE.CylinderGeometry(0,2,4,64,64,true);
            break;

        case "hyperboloid":
            geometry = new THREE.TorusKnotGeometry(1,0.4,128,32);
            break;

        case "ellipsoid":
            geometry = new THREE.SphereGeometry(1.5,64,64);
            geometry.scale(1.5,1,0.8);
            break;

        case "mobius":
            geometry = new THREE.TorusKnotGeometry(1,0.25,128,16);
            break;

        case "knot":
            geometry = new THREE.TorusKnotGeometry(1,0.3,200,32);
            break;
    }

    /* =========================
       COLORS
    ========================= */

    const colors = {

        cube:0xff6b6b,
        sphere:0x4ecdc4,
        cone:0xffa94d,
        cylinder:0x845ef7,
        torus:0xf06595,
        tetrahedron:0x20c997,
        octahedron:0x339af0,
        icosahedron:0xffd43b,
        dodecahedron:0x94d82d,
        paraboloid:0xff922b,
        hyperboloid:0xbe4bdb,
        ellipsoid:0x22b8cf,
        mobius:0xfa5252,
        knot:0x5c7cfa

    };

    const shapeMaterial = new THREE.MeshPhongMaterial({

        color:colors[type] || 0xffffff,

        shininess:180,

        specular:0xffffff

    });

    currentShape = new THREE.Mesh(

        geometry,

        shapeMaterial

    );

    scene.add(currentShape);

    updateInfo(type);
}

/* =========================
   UPDATE INFO
========================= */

function updateInfo(type){

    const d = infoData[type];

    document.getElementById("infoBox").innerHTML = `

        <h2>${d.title}</h2>

        <p class="desc">${d.desc}</p>

        <div class="card">
            <strong>Formula:</strong><br>
            ${d.formula}
        </div>

        <div class="card">
            <strong>Equation:</strong><br>
            ${d.eq}
        </div>

        <div class="card">
            <strong>Interesting Fact:</strong><br>
            ${d.extra}
        </div>

        <div class="level">
            ${d.level}
        </div>

        <div class="tip">
            💡 Drag to rotate the shape and use mouse wheel to zoom.
        </div>

    `;
}

/* =========================
   INITIAL SHAPE
========================= */

createShape("cube");

/* =========================
   SHAPE SELECT
========================= */

document.getElementById("shapeSelect")

.addEventListener("change",function(e){

    createShape(e.target.value);

});

/* =========================
   ANIMATION
========================= */

function animate(){

    requestAnimationFrame(animate);

    controls.update();

    renderer.render(scene,camera);
}

animate();

/* =========================
   RESPONSIVE
========================= */

window.addEventListener("resize",function(){

    camera.aspect =

        window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(

        window.innerWidth,

        window.innerHeight

    );

});

</script>

</body>
</html>
