<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced 3D Mathematics Explorer</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#050816;
    font-family:Arial, sans-serif;
    color:white;
}

#panel{
    position:absolute;
    top:10px;
    left:10px;
    width:340px;
    max-height:95vh;
    overflow:auto;
    background:rgba(0,0,0,0.75);
    padding:20px;
    border-radius:15px;
    z-index:100;
    backdrop-filter:blur(10px);
}

h1{
    margin-top:0;
    color:#4fc3f7;
}

select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#13203d;
    color:white;
    font-size:16px;
}

.info{
    margin-top:20px;
    line-height:1.7;
}

.formula{
    margin-top:10px;
    background:#111c36;
    padding:12px;
    border-radius:10px;
    color:#ffd54f;
    font-weight:bold;
}

.level{
    margin-top:10px;
    display:inline-block;
    background:#0077ff;
    padding:6px 12px;
    border-radius:30px;
    font-size:13px;
}

canvas{
    display:block;
}

</style>
</head>
<body>

<div id="panel">

    <h1>📐 Math Shapes Explorer</h1>

    <select id="shapeSelect">

        <optgroup label="Basic Shapes">
            <option value="cube">Cube</option>
            <option value="sphere">Sphere</option>
            <option value="cone">Cone</option>
            <option value="cylinder">Cylinder</option>
            <option value="torus">Torus</option>
        </optgroup>

        <optgroup label="Platonic Solids">
            <option value="tetrahedron">Tetrahedron</option>
            <option value="octahedron">Octahedron</option>
            <option value="icosahedron">Icosahedron</option>
            <option value="dodecahedron">Dodecahedron</option>
        </optgroup>

        <optgroup label="Higher Mathematics">
            <option value="paraboloid">Paraboloid</option>
            <option value="hyperboloid">Hyperboloid</option>
            <option value="ellipsoid">Ellipsoid</option>
            <option value="mobius">Mobius Strip</option>
            <option value="knot">Torus Knot</option>
        </optgroup>

    </select>

    <div class="info" id="infoBox"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050816);

const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);

controls.enableDamping = true;

const light1 = new THREE.PointLight(0xffffff,2);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.AmbientLight(0xffffff,0.7);
scene.add(light2);

const grid = new THREE.GridHelper(30,30);
scene.add(grid);

const material = new THREE.MeshNormalMaterial({
    wireframe:false
});

let currentShape;

const infoData = {

cube:{
title:"Cube",
desc:"A cube has 6 equal square faces.",
formula:"Volume = a³",
eq:"Cartesian: x,y,z bounded equally",
level:"School Geometry"
},

sphere:{
title:"Sphere",
desc:"Perfect round 3D object.",
formula:"Volume = 4/3 πr³",
eq:"x² + y² + z² = r²",
level:"School Geometry"
},

cone:{
title:"Cone",
desc:"Circular base with one apex.",
formula:"Volume = 1/3 πr²h",
eq:"x² + y² = z²",
level:"Middle School"
},

cylinder:{
title:"Cylinder",
desc:"Two circular bases connected.",
formula:"Volume = πr²h",
eq:"x² + y² = r²",
level:"School Geometry"
},

torus:{
title:"Torus",
desc:"Donut shaped surface.",
formula:"Advanced Topology Shape",
eq:"(R − √(x²+y²))² + z² = r²",
level:"Higher Mathematics"
},

tetrahedron:{
title:"Tetrahedron",
desc:"4 triangular faces.",
formula:"Volume = a³ / (6√2)",
eq:"Polyhedron",
level:"Advanced Geometry"
},

octahedron:{
title:"Octahedron",
desc:"8 triangular faces.",
formula:"Volume = (√2/3)a³",
eq:"Polyhedron",
level:"Advanced Geometry"
},

icosahedron:{
title:"Icosahedron",
desc:"20 triangular faces.",
formula:"Complex Polyhedral Formula",
eq:"Polyhedron",
level:"Higher Geometry"
},

dodecahedron:{
title:"Dodecahedron",
desc:"12 pentagonal faces.",
formula:"Advanced Polyhedron Formula",
eq:"Polyhedron",
level:"Higher Geometry"
},

paraboloid:{
title:"Paraboloid",
desc:"3D parabola surface.",
formula:"z = x² + y²",
eq:"Parabola: y = x²",
level:"Calculus & Analytical Geometry"
},

hyperboloid:{
title:"Hyperboloid",
desc:"Hyperbola based 3D surface.",
formula:"x² + y² - z² = 1",
eq:"Hyperbola: x²/a² - y²/b² = 1",
level:"Higher Mathematics"
},

ellipsoid:{
title:"Ellipsoid",
desc:"Stretched sphere.",
formula:"x²/a² + y²/b² + z²/c² = 1",
eq:"Ellipse: x²/a² + y²/b² = 1",
level:"Analytical Geometry"
},

mobius:{
title:"Mobius Strip",
desc:"Surface with one side only.",
formula:"Topology Surface",
eq:"Non-orientable geometry",
level:"University Mathematics"
},

knot:{
title:"Torus Knot",
desc:"Advanced topological knot.",
formula:"Parametric Equations",
eq:"Topology & Knot Theory",
level:"Higher Studies"
}

};

function createShape(type){

    if(currentShape){
        scene.remove(currentShape);
    }

    let geometry;

    switch(type){

        case "cube":
            geometry = new THREE.BoxGeometry(2,2,2);
            break;

        case "sphere":
            geometry = new THREE.SphereGeometry(1.5,64,64);
            break;

        case "cone":
            geometry = new THREE.ConeGeometry(1.5,3,64);
            break;

        case "cylinder":
            geometry = new THREE.CylinderGeometry(1.2,1.2,3,64);
            break;

        case "torus":
            geometry = new THREE.TorusGeometry(1.5,0.5,32,100);
            break;

        case "tetrahedron":
            geometry = new THREE.TetrahedronGeometry(2);
            break;

        case "octahedron":
            geometry = new THREE.OctahedronGeometry(2);
            break;

        case "icosahedron":
            geometry = new THREE.IcosahedronGeometry(2);
            break;

        case "dodecahedron":
            geometry = new THREE.DodecahedronGeometry(2);
            break;

        case "paraboloid":
            geometry = new THREE.CylinderGeometry(0,2,4,64,64,true);
            break;

        case "hyperboloid":
            geometry = new THREE.HyperboloidGeometry;
            geometry = new THREE.TorusKnotGeometry(1,0.4,128,32);
            break;

        case "ellipsoid":
            geometry = new THREE.SphereGeometry(1.5,64,64);
            geometry.scale(1.5,1,0.8);
            break;

        case "mobius":
            geometry = new THREE.TorusKnotGeometry(1,0.25,128,16);
            break;

        case "knot":
            geometry = new THREE.TorusKnotGeometry(1,0.3,200,32);
            break;
    }

    currentShape = new THREE.Mesh(geometry,material);

    scene.add(currentShape);

    updateInfo(type);
}

function updateInfo(type){

    const d = infoData[type];

    document.getElementById("infoBox").innerHTML = `

        <h2>${d.title}</h2>

        <p>${d.desc}</p>

        <div class="formula">
            ${d.formula}
        </div>

        <div class="formula">
            ${d.eq}
        </div>

        <div class="level">
            ${d.level}
        </div>

    `;
}

createShape("cube");

document.getElementById("shapeSelect").addEventListener("change",function(e){

    createShape(e.target.value);

});

function animate(){

    requestAnimationFrame(animate);

    controls.update();

    renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",function(){

    camera.aspect = window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
