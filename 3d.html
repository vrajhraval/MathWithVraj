<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Math Explorer (Advanced Surfaces)</title>

<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(','\\)']],
    displayMath: [['\\[','\\]']]
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    font-family:Arial;
    background:#050816;
    color:white;
}

#panel{
    position:absolute;
    top:15px;
    left:15px;
    width:390px;
    max-height:95vh;
    overflow:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:14px;
    padding:14px;
}

h1{color:#4fc3f7;font-size:20px;}

select{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#111b3d;
    color:white;
    border:none;
    border-radius:8px;
}

.counter{
    display:flex;
    justify-content:space-between;
    color:#ffd54f;
    font-weight:bold;
}

.card{
    margin-top:10px;
    padding:10px;
    background:rgba(255,255,255,0.06);
    border-left:4px solid #4fc3f7;
    border-radius:8px;
    line-height:1.6;
}

</style>
</head>

<body>

<div id="panel">

<h1>📐 Advanced 3D Math Explorer</h1>

<select id="shapeSelect">

<option value="cube">Cube</option>
<option value="cuboid">Cuboid</option>
<option value="sphere">Sphere</option>
<option value="cone">Cone</option>
<option value="cylinder">Cylinder</option>
<option value="torus">Torus</option>

<option value="tetrahedron">Tetrahedron</option>
<option value="octahedron">Octahedron</option>
<option value="icosahedron">Icosahedron</option>
<option value="dodecahedron">Dodecahedron</option>

<!-- NEW ADVANCED SURFACES -->
<option value="paraboloid">Paraboloid</option>
<option value="elliptic_paraboloid">Elliptic Paraboloid</option>
<option value="hyperbolic_paraboloid">Hyperbolic Paraboloid</option>
<option value="ellipsoid">Ellipsoid</option>

</select>

<div class="counter">
<span id="vCount">Vertices: 0</span>
<span id="eCount">Edges: 0</span>
</div>

<div id="infoBox"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

/* ================= SCENE ================= */

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x050816);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,6);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

scene.add(new THREE.AmbientLight(0xffffff,1.2));

const light=new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(5,5,5);
scene.add(light);

let group=new THREE.Group();
scene.add(group);

function clear(){group.clear();}

/* COLORS */

const colors={
cube:0xff3b30,
cuboid:0xff9500,
sphere:0x00d2ff,
cone:0xffcc00,
cylinder:0xaf52de,
torus:0xff2d55,
tetrahedron:0x30d158,
octahedron:0x0a84ff,
icosahedron:0xffd60a,
dodecahedron:0x32d74b,

paraboloid:0xff5e00,
elliptic_paraboloid:0x00ffcc,
hyperbolic_paraboloid:0xff0066,
ellipsoid:0x4cd964
};

/* ================= MATH INFO ================= */

const info={

cube:["Cube","V=a^3","x=y=z","8 vertices, 12 edges"],

sphere:["Sphere","V=4/3 π r^3","x^2+y^2+z^2=r^2","Perfect symmetry"],

cone:["Cone","V=1/3 π r^2 h","x^2+y^2=z^2","1 vertex"],

cylinder:["Cylinder","V=π r^2 h","x^2+y^2=r^2","2 bases"],

torus:["Torus","V=2π^2 R r^2","(R-√(x^2+y^2))^2+z^2=r^2","Donut shape"],

paraboloid:[
"Paraboloid",
"z = x^2 + y^2",
"3D quadratic surface",
"Rotational parabola"
],

elliptic_paraboloid:[
"Elliptic Paraboloid",
"z = x^2/a^2 + y^2/b^2",
"Stretched parabola",
"Satellite dish shape"
],

hyperbolic_paraboloid:[
"Hyperbolic Paraboloid",
"z = x^2/a^2 - y^2/b^2",
"Saddle surface",
"Architecture use"
],

ellipsoid:[
"Ellipsoid",
"x^2/a^2 + y^2/b^2 + z^2/c^2 = 1",
"Deformed sphere",
"Earth shape approximation"
]

};

/* ================= GEOMETRY BUILDER ================= */

function create(type){

clear();

let geo;

/* BASIC SOLIDS */
switch(type){

case "cube":geo=new THREE.BoxGeometry(2,2,2);break;
case "cuboid":geo=new THREE.BoxGeometry(2.5,1.5,1);break;
case "sphere":geo=new THREE.SphereGeometry(1.5,24,24);break;
case "cone":geo=new THREE.ConeGeometry(1.5,3,24);break;
case "cylinder":geo=new THREE.CylinderGeometry(1.2,1.2,3,24);break;
case "torus":geo=new THREE.TorusGeometry(1.5,0.5,24,48);break;

case "tetrahedron":geo=new THREE.TetrahedronGeometry(2);break;
case "octahedron":geo=new THREE.OctahedronGeometry(2);break;
case "icosahedron":geo=new THREE.IcosahedronGeometry(2);break;
case "dodecahedron":geo=new THREE.DodecahedronGeometry(2);break;

/* ===== ADVANCED SURFACES ===== */

case "paraboloid":
geo=new THREE.ParametricGeometry((u,v,target)=>{
let x=(u-0.5)*4;
let y=(v-0.5)*4;
let z=x*x+y*y;
target.set(x,z,y);
},30,30);
break;

case "elliptic_paraboloid":
geo=new THREE.ParametricGeometry((u,v,target)=>{
let x=(u-0.5)*4;
let y=(v-0.5)*4;
let z=(x*x/4)+(y*y/2);
target.set(x,z,y);
},30,30);
break;

case "hyperbolic_paraboloid":
geo=new THREE.ParametricGeometry((u,v,target)=>{
let x=(u-0.5)*4;
let y=(v-0.5)*4;
let z=(x*x/4)-(y*y/4);
target.set(x,z,y);
},30,30);
break;

case "ellipsoid":
geo=new THREE.SphereGeometry(1.5,32,32);
geo.scale(1.5,1,0.8);
break;

}

/* MATERIAL */

const mesh=new THREE.Mesh(
geo,
new THREE.MeshPhongMaterial({
color:colors[type],
shininess:120,
side:THREE.DoubleSide
})
);

group.add(mesh);

/* EDGES */

const edges=new THREE.LineSegments(
new THREE.EdgesGeometry(geo),
new THREE.LineBasicMaterial({color:0xffffff})
);

group.add(edges);

/* VERTICES */

const p=geo.attributes.position;
const pts=[];

for(let i=0;i<p.count;i++){
pts.push(new THREE.Vector3(p.getX(i),p.getY(i),p.getZ(i)));
}

group.add(new THREE.Points(
new THREE.BufferGeometry().setFromPoints(pts),
new THREE.PointsMaterial({color:0xffd700,size:0.05})
));

/* UI */

document.getElementById("vCount").innerText="Vertices: "+p.count;
document.getElementById("eCount").innerText="Edges: "+edges.geometry.attributes.position.count/2;

const d=info[type];

document.getElementById("infoBox").innerHTML=`
<div class="card">

<b>${d[0]}</b><br><br>

Formula:<br>
\\[ ${d[1]} \\]<br><br>

Description:<br>
\\[ ${d[2]} \\]<br><br>

${d[3]}

</div>
`;

setTimeout(()=>{
if(window.MathJax?.typesetPromise){
MathJax.typesetPromise();
}
},80);

}

/* INIT */

create("cube");

document.getElementById("shapeSelect").addEventListener("change",(e)=>{
create(e.target.value);
});

/* LOOP */

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

/* RESIZE */

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
