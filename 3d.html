<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Math Shapes</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000814;
    color:white;
    font-family:Arial;
}

#menu{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:rgba(0,0,0,0.7);
    padding:15px;
    border-radius:10px;
}

select{
    padding:10px;
    width:220px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

h2{
    margin-top:0;
    color:#4fc3f7;
}
</style>
</head>
<body>

<div id="menu">
    <h2>3D Math Shapes</h2>

    <select id="shapeSelect">
        <option value="cube">Cube</option>
        <option value="sphere">Sphere</option>
        <option value="cone">Cone</option>
        <option value="cylinder">Cylinder</option>
        <option value="torus">Torus</option>
    </select>

    <p>Drag mouse to rotate</p>
</div>

<!-- OLD STYLE THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

let camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.z = 5;

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls = new THREE.OrbitControls(camera, renderer.domElement);

let light = new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

let ambient = new THREE.AmbientLight(0xffffff,0.7);
scene.add(ambient);

let material = new THREE.MeshNormalMaterial();

let currentShape;

function createShape(type){

    if(currentShape){
        scene.remove(currentShape);
    }

    let geometry;

    if(type==="cube"){
        geometry = new THREE.BoxGeometry(2,2,2);
    }

    if(type==="sphere"){
        geometry = new THREE.SphereGeometry(1.5,32,32);
    }

    if(type==="cone"){
        geometry = new THREE.ConeGeometry(1.5,3,32);
    }

    if(type==="cylinder"){
        geometry = new THREE.CylinderGeometry(1,1,3,32);
    }

    if(type==="torus"){
        geometry = new THREE.TorusGeometry(1.5,0.5,16,100);
    }

    currentShape = new THREE.Mesh(geometry,material);

    scene.add(currentShape);
}

createShape("cube");

document.getElementById("shapeSelect").addEventListener("change",function(e){
    createShape(e.target.value);
});

function animate(){

    requestAnimationFrame(animate);

    if(currentShape){
        currentShape.rotation.x += 0.01;
        currentShape.rotation.y += 0.01;
    }

    controls.update();

    renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",function(){

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
