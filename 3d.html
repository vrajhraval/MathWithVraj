<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Math Shapes Explorer</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        background:#050816;
        font-family:Arial, sans-serif;
        color:white;
    }

    #ui{
        position:absolute;
        top:15px;
        left:15px;
        width:320px;
        background:rgba(0,0,0,0.7);
        padding:20px;
        border-radius:15px;
        z-index:100;
        backdrop-filter:blur(10px);
    }

    h1{
        margin-top:0;
        color:#4fc3f7;
    }

    select, button{
        width:100%;
        margin-top:10px;
        padding:12px;
        border:none;
        border-radius:10px;
        font-size:16px;
    }

    select{
        background:#13203d;
        color:white;
    }

    button{
        background:linear-gradient(45deg,#00c6ff,#0072ff);
        color:white;
        cursor:pointer;
        font-weight:bold;
    }

    button:hover{
        opacity:0.9;
    }

    #info{
        margin-top:15px;
        line-height:1.6;
        color:#ddd;
    }
</style>
</head>
<body>

<div id="ui">
    <h1>📐 3D Shapes</h1>

    <select id="shapeSelect">
        <option value="cube">Cube</option>
        <option value="sphere">Sphere</option>
        <option value="cone">Cone</option>
        <option value="cylinder">Cylinder</option>
        <option value="torus">Torus</option>
        <option value="tetrahedron">Tetrahedron</option>
        <option value="octahedron">Octahedron</option>
        <option value="icosahedron">Icosahedron</option>
        <option value="dodecahedron">Dodecahedron</option>
        <option value="knot">Torus Knot</option>
    </select>

    <button onclick="toggleRotation()">Toggle Rotation</button>
    <button onclick="toggleWireframe()">Toggle Wireframe</button>

    <div id="info">
        Interactive mathematical 3D geometry explorer.
        Rotate using mouse drag and zoom using scroll wheel.
    </div>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050816);

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(0,2,5);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

const ambientLight = new THREE.AmbientLight(0xffffff,1.2);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff,2);
directionalLight.position.set(5,5,5);
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0x4fc3f7,2);
pointLight.position.set(-5,5,5);
scene.add(pointLight);

const grid = new THREE.GridHelper(20,20,0x444444,0x222222);
scene.add(grid);

let material = new THREE.MeshPhongMaterial({
    color:0x4fc3f7,
    shininess:100
});

let shape;
let rotating = true;
let wireframe = false;

function createShape(type){

    if(shape){
        scene.remove(shape);
    }

    let geometry;

    switch(type){

        case "cube":
            geometry = new THREE.BoxGeometry(2,2,2);
            break;

        case "sphere":
            geometry = new THREE.SphereGeometry(1.5,64,64);
            break;

        case "cone":
            geometry = new THREE.ConeGeometry(1.5,3,64);
            break;

        case "cylinder":
            geometry = new THREE.CylinderGeometry(1.2,1.2,3,64);
            break;

        case "torus":
            geometry = new THREE.TorusGeometry(1.5,0.5,32,100);
            break;

        case "tetrahedron":
            geometry = new THREE.TetrahedronGeometry(2);
            break;

        case "octahedron":
            geometry = new THREE.OctahedronGeometry(2);
            break;

        case "icosahedron":
            geometry = new THREE.IcosahedronGeometry(2);
            break;

        case "dodecahedron":
            geometry = new THREE.DodecahedronGeometry(2);
            break;

        case "knot":
            geometry = new THREE.TorusKnotGeometry(1,0.3,128,32);
            break;
    }

    shape = new THREE.Mesh(geometry,material);
    scene.add(shape);
}

createShape("cube");

document.getElementById("shapeSelect").addEventListener("change",(e)=>{
    createShape(e.target.value);
});

window.toggleRotation = function(){
    rotating = !rotating;
}

window.toggleWireframe = function(){
    wireframe = !wireframe;
    material.wireframe = wireframe;
}

function animate(){

    requestAnimationFrame(animate);

    if(shape && rotating){
        shape.rotation.x += 0.005;
        shape.rotation.y += 0.01;
    }

    controls.update();
    renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
