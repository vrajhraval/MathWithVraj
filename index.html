    function plotGraph() {

        const input = document.getElementById('eq-input').value;
        const points = [];

        try {

            const expr = math.compile(input);

            for (let x = -50; x <= 50; x += 0.05) {

                let y = expr.evaluate({ x: x });

                if (typeof y === 'number' && isFinite(y)) {
                    points.push({ x: x, y: y });
                }
            }

            if (myChart) {
                myChart.destroy();
            }

            const ctx = document.getElementById('mathChart').getContext('2d');

            myChart = new Chart(ctx, {
                type: 'scatter',

                data: {
                    datasets: [{
                        label: 'f(x)',
                        data: points,
                        showLine: true,
                        borderColor: '#e94560',
                        borderWidth: 2,
                        pointRadius: 0
                    }]
                },

                options: {
                    responsive: true,
                    maintainAspectRatio: false,

                    scales: {
                        x: {
                            type: 'linear',
                            min: -10,
                            max: 10
                        },

                        y: {
                            min: -10,
                            max: 10
                        }
                    },

                    plugins: {
                        zoom: {
                            pan: {
                                enabled: true,
                                mode: 'xy'
                            },

                            zoom: {
                                wheel: {
                                    enabled: true
                                },

                                pinch: {
                                    enabled: true
                                },

                                mode: 'xy'
                            }
                        }
                    }
                }
            });

        } catch (err) {

            alert("Invalid mathematical expression.");
        }
    }

    function solveQuadratic() {

        const a = parseFloat(document.getElementById('solve-a').value);
        const b = parseFloat(document.getElementById('solve-b').value);
        const c = parseFloat(document.getElementById('solve-c').value);

        const outputDiv = document.getElementById('solver-steps-output');

        if (a === 0) {

            outputDiv.innerHTML =
                "<p style='color:red;'>Coefficient a cannot be zero.</p>";

            outputDiv.style.display = "block";

            return;
        }

        const D = b * b - 4 * a * c;

        let html = `
            <h3>Solution Steps</h3>

            <div class="step-item">
                $$
                D=b^2-4ac
                $$

                $$
                D=(${b})^2-4(${a})(${c})
                $$

                $$
                D=${D}
                $$
            </div>
        `;

        if (D < 0) {

            html += `
                <div class="step-item">
                    No real roots exist because:
                    $$
                    D<0
                    $$
                </div>
            `;

        } else {

            const root1 = (-b + Math.sqrt(D)) / (2 * a);
            const root2 = (-b - Math.sqrt(D)) / (2 * a);

            html += `
                <div class="step-item">

                    $$
                    x=\\frac{-b\\pm\\sqrt{D}}{2a}
                    $$

                    $$
                    x_1=${root1.toFixed(3)}
                    $$

                    $$
                    x_2=${root2.toFixed(3)}
                    $$

                </div>
            `;
        }

        outputDiv.innerHTML = html;
        outputDiv.style.display = "block";

        MathJax.typesetPromise([outputDiv]);
    }

    let currentQuestionIndex = 0;

    function renderCurrentQuiz() {

        const quiz = quizDatabase[currentQuestionIndex];

        document.getElementById('quiz-question').innerHTML =
            `<strong>Question ${currentQuestionIndex + 1}:</strong> ${quiz.question}`;

        const optionsBox =
            document.getElementById('quiz-options-box');

        optionsBox.innerHTML = "";

        quiz.options.forEach((opt, idx) => {

            const btn = document.createElement('button');

            btn.className = 'quiz-btn';

            btn.innerHTML = opt;

            btn.onclick = () => evaluateQuizSelection(idx);

            optionsBox.appendChild(btn);
        });

        document.getElementById('quiz-feedback-box').style.display = "none";
        document.getElementById('next-quiz-btn').style.display = "none";

        MathJax.typesetPromise();
    }

    function evaluateQuizSelection(selectedIndex) {

        const quiz = quizDatabase[currentQuestionIndex];

        const feedbackBox =
            document.getElementById('quiz-feedback-box');

        const optionButtons =
            document.querySelectorAll('.quiz-btn');

        optionButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === quiz.correct) {

            optionButtons[selectedIndex].style.background = "#d4edda";

            feedbackBox.style.background = "#d4edda";
            feedbackBox.style.color = "green";

            feedbackBox.innerHTML =
                `<strong>Correct Answer!</strong><br>${quiz.explanation}`;

        } else {

            optionButtons[selectedIndex].style.background = "#f8d7da";

            optionButtons[quiz.correct].style.background = "#d4edda";

            feedbackBox.style.background = "#f8d7da";
            feedbackBox.style.color = "red";

            feedbackBox.innerHTML =
                `<strong>Wrong Answer!</strong><br>${quiz.explanation}`;
        }

        feedbackBox.style.display = "block";

        document.getElementById('next-quiz-btn').style.display = "inline-block";

        MathJax.typesetPromise([feedbackBox]);
    }

    function loadNextQuestion() {

        currentQuestionIndex++;

        if (currentQuestionIndex >= quizDatabase.length) {
            currentQuestionIndex = 0;
        }

        renderCurrentQuiz();
    }
